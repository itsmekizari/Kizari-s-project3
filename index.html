<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forလေားရှည်မ</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff0f5;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 300px;
            position: relative;
        }
        img {
            width: 150px;
            margin-bottom: 20px;
        }
        h2 {
            color: #db2777;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 50px;
        }
        button {
            width: 100px; /* Yes နဲ့ No ခလုတ် Size အစမှာ အတူတူဖြစ်အောင် ထိန်းပေးထားတာပါ */
            padding: 12px 0; /* အပေါ်အောက် padding ပဲပေးပြီး width ကို ပုံသေသုံးလိုက်ပါတယ် */
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.1s ease; /* Scale ချောချောမွေ့မွေ့ဖြစ်အောင်လို့ပါ */
        }
        #yes {
            background-color: #ec4899;
            color: white;
            z-index: 2;
        }
        #no {
            background-color: #9ca3af;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="card">
        <img id="img" src="https://media.tenor.com/aveJW-reuDAAAAAd/sad-lonely.gif">
        <h2 id="text">ချစ်သေးလားဟင်🥹</h2>

        <div class="btn-group" id="btnGroup">
            <button id="yes" onclick="showLove()">Yes</button>
            <button id="no" onmouseover="moveNo()" onclick="moveNo()" ontouchstart="moveNo()">No</button>
        </div>
    </div>

    <script>
        // Layout မပျက်ဘဲ တိကျမှုရှိအောင် Scale စနစ်ကို သုံးထားပါတယ်
        let yesScale = 1;
        let noScale = 1;

        function showLove() {
            document.getElementById('img').src = "https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-hug.gif";
            document.getElementById('text').innerText = "ကိုလည်း ချစ်ပါတယ်နော်💘";
            document.getElementById('btnGroup').style.display = 'none'; // ID စာလုံးပေါင်း ပြင်ဆင်ပြီး
        }

        function moveNo() {
            const noBtn = document.getElementById('no');
            const yesBtn = document.getElementById('yes');
            
            // ၁။ ခလုတ်ကို window ရဲ့ random နေရာကို ရွှေ့ပေးခြင်း
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 60);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // ၂။ Yes ခလုတ် ပိုကြီးလာစေခြင်း (မူလ Size ထက်ပဲ အမြဲကြီးသွားပါမယ်)
            yesScale += 0.2;
            yesBtn.style.transform = `scale(${yesScale})`;

            // ၃။ No ခလုတ် သေးသွားစေခြင်း
            noScale -= 0.1;
            if(noScale < 0.3) {
                noBtn.style.display = 'none'; // အရမ်းသေးသွားရင် ပျောက်သွားမယ်
            } else {
                noBtn.style.transform = `scale(${noScale})`;
            }
        }
    </script>
</body>
</html>
