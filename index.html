<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forလေားရှည်မ</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff0f5;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 300px;
            position: relative;
        }
        img {
            width: 150px;
            margin-bottom: 20px;
        }
        h2 {
            color: #db2777;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 50px;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s ease;
        }
        #yes {
            background-color: #ec4899;
            color: white;
            z-index: 2;
        }
        #no {
            background-color: #9ca3af;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="card">
        <img id="img" src="https://media.tenor.com/aveJW-reuDAAAAAd/sad-lonely.gif" alt="Cute">
        <h2 id="text">ချစ်သေးလားဟင်🥹</h2>
        
        <div class="btn-group" id="btnGroup">
            <button id="yes" onclick="showLove()">Yes</button>
            <button id="no" onmouseover="moveNo(event)" ontouchstart="moveNo(event)">No</button>
        </div>
    </div>

    <script>
        let yesScale = 1;
        let noScale = 1;

        function showLove() {
            document.getElementById('img').src = "https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-hug.gif";
            document.getElementById('text').innerText = "ကိုလည်း ချစ်ပါတယ်နော်💘";
            document.getElementById('btnGroup').style.display = 'none';
        }

        function moveNo(event) {
            if(event && event.type === 'touchstart') {
                event.preventDefault();
            }

            const noBtn = document.getElementById('no');
            const yesBtn = document.getElementById('yes');
            
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            yesScale += 0.3;
            yesBtn.style.transform = `scale(${yesScale})`;

            noScale -= 0.15;

    </style>
</head>
<body>
    <div class="card">
        <img id="img" src="https://media.tenor.com/aveJW-reuDAAAAAd/sad-lonely.gif">
        <h2 id="text">ချစ်သေးလားဟင်🥹</h2>

        <div class="btn-group" id="btnGroup">
            <button id="yes" onclick="showLove()">Yes</button>
            <button id="no"
                    onmouseover="moveNo()"
                    ontouchstart="moveNo()">No</button>
        </div>
    </div>

<script>
        // အကြီးအသေး မှတ်ထားမယ့် ကိန်းဂဏန်းများကို အပေါ်ဆုံးမှာ ကြေညာရပါမယ်
        let yesSize = 16;
        let noSize = 16;

        function showLove() {
            document.getElementById('img').src = "https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-hug.gif";
            document.getElementById('text').innerText = "ကိုလည်း ချစ်ပါတယ်နော်💘";
            document.getElementById('btn-Group').style.display = 'none';
        }

        function moveNo() {
            const noBtn = document.getElementById('no');
            const yesBtn = document.getElementById('yes');
            
            // ၁။ ခလုတ်ကို window ရဲ့ random နေရာကို ရွှေ့ပေးခြင်း
            const x = Math.random() * (window.innerWidth - 80);
            const y = Math.random() * (window.innerHeight - 50);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // ၂။ Yes ခလုတ် ကြီးလာစေခြင်း
            yesSize += 2;
                yesBtn.style.fontSize = yesSize + 'px';
                yesBtn.style.padding = (yesSize/2) + 'px ' + yesSize + 'px';

            // ၃။ No ခလုတ် သေးသွားစေခြင်း
            noSize -= 8;
            if(noSize < 30) {
                noBtn.style.display = 'none'; // အရမ်းသေးသွားရင် ပျောက်သွားမယ်
            } else {
                noBtn.style.fontSize = noSize + 'px';
                noBtn.style.padding = (noSize/2) + 'px ' + noSize + 'px'; // No ကိုပါ Padding သေးသွားအောင် ချိန်ပေးထားပါတယ်
            }
        }
    </script>
</body>
</html>
