<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Particle Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505; /* Deep black background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Hidden SVG path used purely for calculations */
        svg {
            display: none;
        }
    </style>
</head>
<body>

    <!-- The SVG Path representing the heart shape -->
    <!-- ViewBox roughly matches the 600x552 coordinate space in the code snippet -->
    <svg viewBox="0 0 600 552">
        <path id="heartPath" d="M 300, 150 
                 C 300, 150  250, 50   150, 50 
                 C  50, 50    50, 200   50, 200 
                 C  50, 300  300, 500  300, 500 
                 C 300, 500  550, 300  550, 200 
                 C 550, 200  550, 50   450, 50 
                 C 350, 50   300, 150  300, 150 Z"></path>
    </svg>

    <div id="canvas-container"></div>

    <!-- Import Three.js and GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- OrbitControls for interactivity -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        window.onload = function() {
            // --- Three.js Scene Setup ---
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            
            // Set up camera
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Add OrbitControls to let the user pan/rotate around the heart
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // --- The Core Logic from the Screenshot ---
            const path = document.querySelector("path");
            const length = path.getTotalLength();
            const vertices = [];
            
            // Initialize GSAP Timeline
            const tl = gsap.timeline();

            for (let i = 0; i < length; i += 0.1) {
                // Get point on the SVG path
                const point = path.getPointAtLength(i);
                
                // Create a 3D vector. Note: -point.y is used to flip the SVG coordinates right-side up.
                const vector = new THREE.Vector3(point.x, -point.y, 0);
                
                // Add random scattering (noise) to make it look like a glowing cluster
                vector.x += (Math.random() - 0.5) * 30;
                vector.y += (Math.random() - 0.5) * 30;
                vector.z += (Math.random() - 0.5) * 70;
                
                vertices.push(vector);
                
                // Animate particles FROM the center TO their target path positions
                tl.from(vector, {
                    x: 600 / 2,
                    y: -552 / 2,
                    z: 0,
                    ease: "power2.inOut",
                    duration: "random(2, 5)" // GSAP evaluates this randomly per particle
                }, i * 0.002);
            }

            // --- Geometry and Materials ---
            // Create a custom circular gradient texture for soft glowing particles
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 16, 16);
            const particleTexture = new THREE.CanvasTexture(canvas);

            // Initialize buffer geometry with the vectors
            const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
            
            const material = new THREE.PointsMaterial({
                color: 0xff3399, // Vibrant pink
                size: 3,
                map: particleTexture,
                blending: THREE.AdditiveBlending, // Makes overlapping particles glow
                transparent: true,
                depthWrite: false, // Prevents depth sorting issues with transparent objects
                opacity: 0.8
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Center the camera on the heart based on the coordinates in the code (600/2, -552/2)
            const centerX = 600 / 2;
            const centerY = -552 / 2;
            controls.target.set(centerX, centerY, 0);
            camera.position.set(centerX, centerY, 700);

            // --- Animation Loop ---
            function animate() {
                requestAnimationFrame(animate);
                
                // Because GSAP is animating the raw `THREE.Vector3` objects in the `vertices` array,
                // we must manually copy their updated X, Y, Z values back into the geometry buffer every frame.
                const positions = geometry.attributes.position.array;
                for (let i = 0; i < vertices.length; i++) {
                    positions[i * 3] = vertices[i].x;
                    positions[i * 3 + 1] = vertices[i].y;
                    positions[i * 3 + 2] = vertices[i].z;
                }
                geometry.attributes.position.needsUpdate = true; // Tell Three.js to re-render the changes

                controls.update(); // Update camera damping
                renderer.render(scene, camera);
            }

            // Start rendering
            animate();

            // Handle window resizing
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
