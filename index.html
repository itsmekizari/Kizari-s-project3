<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forလေားရှည်မ</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff0f5;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden; /* ခလုတ်ကြီးလာလို့ Scroll ပေါ်မလာအောင် ပိတ်ထားခြင်း */
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 300px;
            position: relative;
            z-index: 1;
        }
        img {
            width: 150px;
            margin-bottom: 20px;
        }
        h2 {
            color: #db2777;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 50px;
        }
        button {
            width: 100px;
            padding: 12px 0;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s ease;
        }
        #yes {
            background-color: #ec4899;
            color: white;
            position: relative;
            z-index: 999; /* Yes ကြီးလာတဲ့အခါ အခြားစာသားတွေ၊ ပုံတွေကိုပါ အုပ်သွားအောင် */
        }
        #no {
            background-color: #9ca3af;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="card">
        <img id="img" src="https://media.tenor.com/aveJW-reuDAAAAAd/sad-lonely.gif">
        <h2 id="text">ချစ်သေးလားဟင်🥹</h2>

        <div class="btn-group" id="btnGroup">
            <button id="yes" onclick="showLove()">Yes</button>
            <button id="no" onmouseover="moveNo()" onclick="moveNo()" ontouchstart="moveNo()">No</button>
        </div>
    </div>

    <script>
        let yesScale = 1;
        let noScale = 1;

        function showLove() {
            document.getElementById('img').src = "https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-hug.gif";
            document.getElementById('text').innerText = "ကိုလည်း ချစ်ပါတယ်နော်💘";
            document.getElementById('btnGroup').style.display = 'none'; 
            
            // Screen အပြည့်ဖြစ်နေတဲ့ Yes ကိုပါ ဖျောက်လိုက်မှ အဖြေပြန်ပေါ်လာမှာပါ
            document.getElementById('yes').style.display = 'none';
        }

        function moveNo() {
            const noBtn = document.getElementById('no');
            const yesBtn = document.getElementById('yes');
            
            // ၁။ No ခလုတ်ကို random နေရာရွှေ့ခြင်း
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 60);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // ၂။ Yes ခလုတ်ကို အဆမတန် ကြီးလာစေခြင်း
            // ဒီနေရာက ဂဏန်းကို များများထားရင် ပိုမြန်မြန် Screen ပြည့်သွားပါမယ်
            yesScale += 2; 
            yesBtn.style.transform = `scale(${yesScale})`;

            // ၃။ No ခလုတ် သေးသွားစေခြင်း
            noScale -= 0.1;
            if(noScale < 0.2) {
                noBtn.style.display = 'none'; 
            } else {
                noBtn.style.transform = `scale(${noScale})`;
            }
        }
    </script>
</body>
</html>
